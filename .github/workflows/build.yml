name: Build KMP App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Android
            os: ubuntu-latest
            task: ":androidApp:assembleDebug"
          - target: Desktop
            os: ubuntu-latest
            task: ":desktopApp:assemble"
          - target: Web
            os: ubuntu-latest
            task: ":webApp:wasmJsBrowserDistribution"
          - target: iOS
            os: macos-latest
            task: ":shared:compileKotlinIosSimulatorArm64"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.target }}
        run: ./gradlew ${{ matrix.task }}
