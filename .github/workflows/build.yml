name: Build KMP App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android
        run: ./gradlew :androidApp:assembleDebug

      - name: Build Desktop (Linux)
        run: ./gradlew :desktopApp:assemble

      - name: Build Web (Wasm)
        run: ./gradlew :webApp:wasmJsBrowserDistribution

      # iOS build requires macOS
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Build iOS
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64
