name: Nightly Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Android APK
        run: ./gradlew :androidApp:assembleDebug -PappVersionCode=${{ github.run_number }} -PappVersionName=nightly-${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk

  build-desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Desktop Package
        run: ./gradlew :desktopApp:package -PappVersionName=nightly-${{ github.run_number }}

      - name: Upload Desktop Package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktopApp/build/compose/binaries/main/deb/*.deb
            desktopApp/build/compose/binaries/main/msi/*.msi

  create-release:
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: Nightly Build ${{ github.run_number }}
          body: |
            Automated nightly build from push to main.
            Version: nightly-${{ github.run_number }}
          files: |
            android-apk/*.apk
            desktop-ubuntu-latest/*.deb
            desktop-windows-latest/*.msi
          draft: false
          prerelease: true # Mark as prerelease for nightly builds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
